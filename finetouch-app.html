<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fine Touch — Controle de Obras</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #102A4B;
  --navy2: #1a3d6e;
  --gold: #C69E63;
  --gold2: #C7B090;
  --cream: #EAE6DA;
  --cream2: #F5F2EC;
  --cream3: #FAFAF8;
  --text: #2c2416;
  --text2: #6b5f4e;
  --text3: #9a8f7e;
  --border: rgba(16,42,75,0.1);
  --success: #3B6D11;
  --success-bg: #f0f7eb;
  --danger: #791F1F;
  --danger-bg: #FCEBEB;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Jost', sans-serif; background: var(--cream); color: var(--text); min-height: 100vh; }

/* HEADER */
.header { background: var(--navy); padding: 0 1.25rem; display: flex; align-items: center; justify-content: space-between; height: 58px; position: sticky; top: 0; z-index: 100; }
.logo { display: flex; align-items: center; gap: 10px; }
.logo-text { font-family: 'Cormorant Garamond', serif; }
.logo-name { font-size: 18px; font-weight: 600; color: var(--cream); letter-spacing: .12em; line-height: 1; }
.logo-name span { color: var(--gold); }
.logo-sub { font-size: 9px; color: var(--gold2); letter-spacing: .2em; font-family: 'Jost', sans-serif; font-weight: 300; }
.header-tag { font-size: 11px; color: var(--gold2); letter-spacing: .08em; font-weight: 300; }

/* NAV */
.nav { background: var(--navy); border-top: 0.5px solid rgba(198,158,99,0.2); display: flex; overflow-x: auto; scrollbar-width: none; }
.nav::-webkit-scrollbar { display: none; }
.nav-btn { padding: 11px 16px; font-size: 11px; color: rgba(234,230,218,0.5); background: transparent; border: none; cursor: pointer; letter-spacing: .1em; white-space: nowrap; border-bottom: 2px solid transparent; font-family: 'Jost', sans-serif; font-weight: 500; transition: color .2s; }
.nav-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
.nav-btn:hover:not(.active) { color: var(--cream); }

/* BODY */
.body { padding: 1.25rem; max-width: 700px; margin: 0 auto; }

/* STATUS BAR */
.status-bar { background: var(--navy); color: var(--gold2); font-size: 11px; text-align: center; padding: 6px; letter-spacing: .05em; }
.status-bar.ok { background: var(--success-bg); color: var(--success); }
.status-bar.err { background: var(--danger-bg); color: var(--danger); }

/* CARDS */
.card { background: var(--cream3); border: 0.5px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 10px; }
.card-navy { background: var(--navy); border-radius: 12px; padding: 1.25rem; margin-bottom: 10px; }

/* KPI GRID */
.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 8px; margin-bottom: 1.25rem; }
.kpi { background: var(--cream3); border: 0.5px solid var(--border); border-radius: 10px; padding: .85rem 1rem; }
.kpi-label { font-size: 10px; color: var(--text3); letter-spacing: .08em; margin-bottom: 4px; text-transform: uppercase; }
.kpi-value { font-size: 20px; font-weight: 500; color: var(--navy); font-family: 'Cormorant Garamond', serif; }
.kpi-sub { font-size: 11px; color: var(--text3); margin-top: 2px; }
.kpi.gold { background: rgba(198,158,99,0.08); border-color: rgba(198,158,99,0.25); }
.kpi.gold .kpi-value { color: #7a5c2e; }
.kpi.pos { background: var(--success-bg); border-color: #c0dd97; }
.kpi.pos .kpi-value { color: var(--success); }
.kpi.neg { background: var(--danger-bg); border-color: #F7C1C1; }
.kpi.neg .kpi-value { color: var(--danger); }

/* SECTION LABEL */
.sec-label { font-size: 10px; font-weight: 600; color: var(--gold); letter-spacing: .15em; text-transform: uppercase; margin-bottom: 10px; margin-top: 1.25rem; display: flex; align-items: center; gap: 8px; }
.sec-label::after { content: ''; flex: 1; height: 0.5px; background: rgba(198,158,99,0.3); }

/* JOB CARDS */
.job-card { background: var(--cream3); border: 0.5px solid var(--border); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 8px; transition: border-color .2s; }
.job-card:hover { border-color: rgba(198,158,99,0.4); }
.job-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 10px; }
.job-name { font-size: 14px; font-weight: 500; color: var(--navy); margin-bottom: 3px; }
.job-profit { font-size: 16px; font-weight: 500; font-family: 'Cormorant Garamond', serif; }
.job-profit.pos { color: var(--success); }
.job-profit.neg { color: var(--danger); }
.job-meta { font-size: 11px; color: var(--text3); }
.progress-bg { height: 3px; background: var(--cream); border-radius: 2px; overflow: hidden; margin-top: 8px; }
.progress-fg { height: 100%; border-radius: 2px; transition: width .5s ease; }

/* BADGES */
.badge { font-size: 10px; padding: 2px 8px; border-radius: 20px; display: inline-block; letter-spacing: .04em; font-weight: 500; }
.b-active { background: rgba(198,158,99,0.15); color: #7a5c2e; }
.b-done { background: rgba(16,42,75,0.08); color: var(--navy); }
.b-mat { background: #e8f0f8; color: #1a4a7a; }
.b-mao { background: #eaf3de; color: #3B6D11; }
.b-eqp { background: rgba(198,158,99,0.15); color: #7a5c2e; }
.b-ser { background: #edeaf8; color: #4a3a99; }
.b-inv { background: #eaf3de; color: #3B6D11; }

/* ENTRY ROWS */
.entry-row { display: flex; justify-content: space-between; align-items: flex-start; padding: 9px 0; border-top: 0.5px solid var(--border); gap: 8px; }
.entry-desc { font-size: 13px; font-weight: 500; color: var(--navy); }
.entry-meta { font-size: 11px; color: var(--text3); margin-top: 2px; display: flex; gap: 5px; align-items: center; flex-wrap: wrap; }
.entry-val { font-size: 13px; font-weight: 500; color: var(--navy); display: flex; align-items: center; gap: 6px; white-space: nowrap; font-family: 'Cormorant Garamond', serif; font-size: 15px; }
.del-btn { background: transparent; border: none; color: var(--text3); cursor: pointer; font-size: 14px; padding: 2px 5px; border-radius: 4px; line-height: 1; }
.del-btn:hover { color: var(--danger); background: var(--danger-bg); }

/* CHIPS */
.chips { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 1.25rem; }
.chip { padding: 5px 14px; border-radius: 20px; border: 0.5px solid var(--border); background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; font-family: 'Jost', sans-serif; transition: all .15s; }
.chip.active { background: var(--navy); color: var(--gold); border-color: var(--navy); }
.chip.add { border-color: var(--gold2); color: var(--gold); border-style: dashed; }
.chip:hover:not(.active) { border-color: var(--navy); color: var(--navy); }

/* PERIOD TABS */
.period-bar { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; }
.period-btn { padding: 5px 14px; border-radius: 20px; border: 0.5px solid var(--border); background: transparent; color: var(--text2); font-size: 11px; cursor: pointer; font-family: 'Jost', sans-serif; letter-spacing: .05em; transition: all .15s; }
.period-btn.active { background: var(--gold); color: var(--navy); border-color: var(--gold); font-weight: 600; }

/* FORMS */
.field { display: flex; flex-direction: column; gap: 5px; margin-bottom: 10px; }
.field label { font-size: 10px; color: var(--text3); letter-spacing: .08em; text-transform: uppercase; }
.field input, .field select { padding: 9px 12px; border-radius: 8px; border: 0.5px solid var(--border); background: var(--cream3); color: var(--navy); font-size: 13px; width: 100%; font-family: 'Jost', sans-serif; transition: border-color .2s; }
.field input:focus, .field select:focus { outline: none; border-color: var(--gold); }
.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* TIPO TOGGLE */
.tipo-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.tipo-btn { padding: 12px; border-radius: 10px; border: 0.5px solid var(--border); background: transparent; color: var(--text2); font-size: 12px; cursor: pointer; text-align: center; font-family: 'Jost', sans-serif; transition: all .15s; }
.tipo-btn span { display: block; font-size: 10px; color: var(--text3); margin-top: 2px; font-weight: 300; }
.tipo-btn.active { background: var(--navy); color: var(--gold); border-color: var(--navy); }
.tipo-btn.active span { color: var(--gold2); }

/* SUBMIT BTN */
.submit-btn { width: 100%; padding: 11px; border-radius: 10px; border: none; background: var(--navy); color: var(--gold); font-size: 13px; font-weight: 600; cursor: pointer; font-family: 'Jost', sans-serif; letter-spacing: .08em; margin-top: 6px; transition: background .2s; }
.submit-btn:hover { background: var(--navy2); }

/* CAMERA BTN */
.camera-btn { width: 100%; padding: 11px; border-radius: 10px; border: 0.5px solid var(--gold2); background: transparent; color: var(--gold); font-size: 13px; font-weight: 500; cursor: pointer; font-family: 'Jost', sans-serif; letter-spacing: .06em; margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all .2s; }
.camera-btn:hover { background: rgba(198,158,99,0.08); }
#camera-input { display: none; }

/* PROFIT HERO */
.profit-hero { background: var(--navy); border-radius: 14px; padding: 1.5rem; margin-bottom: 1.25rem; }
.profit-hero-label { font-size: 10px; color: var(--gold2); letter-spacing: .15em; text-transform: uppercase; margin-bottom: 6px; }
.profit-hero-val { font-family: 'Cormorant Garamond', serif; font-size: 36px; font-weight: 300; color: var(--gold); line-height: 1; }
.profit-hero-sub { font-size: 12px; color: var(--gold2); margin-top: 6px; }
.profit-hero-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(90px, 1fr)); gap: 12px; margin-top: 14px; padding-top: 14px; border-top: 0.5px solid rgba(198,158,99,0.2); }
.phi-label { font-size: 10px; color: var(--gold2); letter-spacing: .06em; }
.phi-val { font-size: 16px; font-weight: 500; color: var(--cream); font-family: 'Cormorant Garamond', serif; }

/* CHART */
.chart-wrap { position: relative; height: 200px; }

/* EMPTY */
.empty { text-align: center; padding: 2rem 1rem; color: var(--text3); font-size: 13px; }

/* LOADER */
.loader { text-align: center; padding: 3rem; color: var(--text3); }
.loader-dot { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--gold); margin: 0 2px; animation: bounce .8s infinite alternate; }
.loader-dot:nth-child(2) { animation-delay: .2s; }
.loader-dot:nth-child(3) { animation-delay: .4s; }
@keyframes bounce { from { opacity: .3; transform: translateY(0); } to { opacity: 1; transform: translateY(-6px); } }

/* INFO BOX */
.info-box { background: rgba(16,42,75,0.06); border: 0.5px solid rgba(16,42,75,0.12); border-radius: 10px; padding: 10px 14px; font-size: 12px; color: var(--navy); margin-bottom: 14px; }

.feedback { padding: 10px 14px; border-radius: 10px; font-size: 13px; margin-top: 8px; }
.feedback.ok { background: var(--success-bg); color: var(--success); }
.feedback.err { background: var(--danger-bg); color: var(--danger); }
</style>
</head>
<body>

<div class="header">
  <div class="logo">
    <svg width="34" height="34" viewBox="0 0 34 34">
      <circle cx="17" cy="17" r="16" fill="#EAE6DA"/>
      <rect x="8" y="8" width="8" height="7" fill="#102A4B"/>
      <rect x="18" y="8" width="8" height="7" fill="#102A4B"/>
      <rect x="8" y="17" width="7" height="9" fill="#102A4B"/>
      <rect x="18" y="17" width="8" height="9" fill="#C69E63"/>
      <rect x="8" y="15.5" width="18" height="1.5" fill="#EAE6DA"/>
      <rect x="15.5" y="8" width="1.5" height="18" fill="#EAE6DA"/>
    </svg>
    <div class="logo-text">
      <div class="logo-name">FINE <span>TOUCH</span></div>
      <div class="logo-sub">DECOR &amp; DESIGN</div>
    </div>
  </div>
  <div class="header-tag">Controle de Obras</div>
</div>

<div id="status-bar" class="status-bar">Carregando dados...</div>

<div class="nav">
  <button class="nav-btn active" onclick="setView('dashboard')">DASHBOARD</button>
  <button class="nav-btn" onclick="setView('lucros')">LUCROS</button>
  <button class="nav-btn" onclick="setView('obras')">OBRAS</button>
  <button class="nav-btn" onclick="setView('lancar')">LANÇAR</button>
  <button class="nav-btn" onclick="setView('investimentos')">INVESTIMENTOS</button>
</div>

<div class="body">
  <div id="view-dashboard"></div>
  <div id="view-lucros" style="display:none"></div>
  <div id="view-obras" style="display:none"></div>
  <div id="view-lancar" style="display:none"></div>
  <div id="view-investimentos" style="display:none"></div>
</div>

<input type="file" id="camera-input" accept="image/*" capture="environment">

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const API = 'https://script.google.com/macros/s/AKfycbxscibHf1peqhlCr6Ltf3AJ7ZRVQMW-8nsdJ6LWhhS2kw2Fmvr9S7YG4rbblB0zTY7H/exec';

const CATS = [
  {id:'mat', label:'Materiais', tag:'b-mat'},
  {id:'mao', label:'Mão de obra', tag:'b-mao'},
  {id:'eqp', label:'Equipamentos', tag:'b-eqp'},
  {id:'ser', label:'Serviços', tag:'b-ser'},
];

let DB = { obras: [], lancamentos: [], investimentos: [] };
let ST = { obraAtiva: null, tipoForm: 'obra', periodo: 'mensal', view: 'dashboard' };
let CHARTS = {};

function fmt(v) { return '$' + Math.round(Number(v)||0).toLocaleString('en-US'); }
function fmt2(v) { return '$' + (Number(v)||0).toLocaleString('en-US', {minimumFractionDigits:2, maximumFractionDigits:2}); }
function custo(jid) { return DB.lancamentos.filter(l=>l.obra_id==jid&&l.tipo=='obra').reduce((s,l)=>s+(Number(l.valor)||0),0); }
function lucro(j) { return (Number(j.contrato)||0) - custo(j.id); }
function margem(j) { const c=Number(j.contrato)||0; return c>0?(lucro(j)/c*100):0; }
function pct(j) { const c=Number(j.contrato)||0; return c>0?Math.min(100,Math.round(custo(j.id)/c*100)):0; }
function dc(id) { if(CHARTS[id]){CHARTS[id].destroy();delete CHARTS[id];} }

function setStatus(msg, type='') {
  const el = document.getElementById('status-bar');
  el.textContent = msg;
  el.className = 'status-bar' + (type?' '+type:'');
  if(type==='ok') setTimeout(()=>{ el.textContent='Dados salvos no Google Sheets'; el.className='status-bar'; }, 3000);
}

async function api(params) {
  const url = API + '?' + new URLSearchParams(params);
  const res = await fetch(url);
  return res.json();
}

async function carregarDados() {
  setStatus('Carregando dados...');
  try {
    const data = await api({action:'getAll'});
    DB.obras = data.obras || [];
    DB.lancamentos = data.lancamentos || [];
    DB.investimentos = data.investimentos || [];
    if(DB.obras.length > 0 && !ST.obraAtiva) ST.obraAtiva = DB.obras[0].id;
    setStatus('Dados sincronizados com Google Sheets', 'ok');
    renderView();
  } catch(e) {
    setStatus('Erro ao carregar dados. Verifique conexão.', 'err');
    renderView();
  }
}

async function salvar(sheet, data) {
  setStatus('Salvando...');
  try {
    await api({action:'save', sheet, data: JSON.stringify(data)});
    await carregarDados();
    setStatus('Salvo!', 'ok');
  } catch(e) {
    setStatus('Erro ao salvar.', 'err');
  }
}

async function deletar(sheet, id) {
  setStatus('Removendo...');
  try {
    await api({action:'delete', sheet, id});
    await carregarDados();
  } catch(e) {
    setStatus('Erro ao remover.', 'err');
  }
}

async function atualizar(sheet, id, data) {
  setStatus('Atualizando...');
  try {
    await api({action:'update', sheet, id, data: JSON.stringify(data)});
    await carregarDados();
  } catch(e) {
    setStatus('Erro ao atualizar.', 'err');
  }
}

function gerarId() { return Date.now().toString(); }

function setView(v) {
  ST.view = v;
  ['dashboard','lucros','obras','lancar','investimentos'].forEach(x=>{
    document.getElementById('view-'+x).style.display = x===v?'':'none';
  });
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{
    b.classList.toggle('active', ['dashboard','lucros','obras','lancar','investimentos'][i]===v);
  });
  renderView();
}

function renderView() {
  const v = ST.view;
  if(v==='dashboard') rDash();
  if(v==='lucros') rLucros();
  if(v==='obras') rObras();
  if(v==='lancar') rLancar();
  if(v==='investimentos') rInv();
}

function rDash() {
  dc('dash-cat');
  const el = document.getElementById('view-dashboard');
  if(!DB.obras.length && !DB.lancamentos.length) {
    el.innerHTML = `<div class="loader"><span class="loader-dot"></span><span class="loader-dot"></span><span class="loader-dot"></span><p style="margin-top:1rem;font-size:13px;">Carregando...</p></div>`;
    return;
  }
  const totalC = DB.obras.reduce((s,j)=>s+(Number(j.contrato)||0),0);
  const totalCusto = DB.lancamentos.filter(l=>l.tipo==='obra').reduce((s,l)=>s+(Number(l.valor)||0),0);
  const totalL = DB.obras.reduce((s,j)=>s+lucro(j),0);
  const avgM = totalC>0?(totalL/totalC*100):0;
  const inv = DB.investimentos.reduce((s,i)=>s+(Number(i.valor)||0),0);
  const pclass = totalL>=0?'pos':'neg';
  const cats = CATS.map(c=>({...c, v:DB.lancamentos.filter(l=>l.categoria===c.id&&l.tipo==='obra').reduce((s,l)=>s+(Number(l.valor)||0),0)}));

  const jobCards = DB.obras.map(j=>{
    const p=lucro(j); const pc=pct(j); const done=j.status==='concluida';
    const barColor = pc>90?'#E24B4A':pc>70?'#C69E63':'#102A4B';
    return `<div class="job-card">
      <div class="job-top">
        <div>
          <div class="job-name">${j.nome}</div>
          <span class="badge ${done?'b-done':'b-active'}">${done?'Concluída':'Em andamento'}</span>
        </div>
        <div style="text-align:right;">
          <div class="job-profit ${p>=0?'pos':'neg'}">${fmt(p)}</div>
          <div class="job-meta">${done?'lucro real':'lucro est.'} · ${margem(j).toFixed(1)}%</div>
        </div>
      </div>
      <div style="font-size:11px;color:var(--text3);margin-bottom:3px;">Gasto: ${fmt(custo(j.id))} de ${fmt(j.contrato)}</div>
      <div class="progress-bg"><div class="progress-fg" style="width:${pc}%;background:${barColor};"></div></div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi"><div class="kpi-label">Total contratos</div><div class="kpi-value">${fmt(totalC)}</div><div class="kpi-sub">${DB.obras.length} obras</div></div>
      <div class="kpi"><div class="kpi-label">Total custos</div><div class="kpi-value">${fmt(totalCusto)}</div><div class="kpi-sub">todas as obras</div></div>
      <div class="kpi ${pclass}"><div class="kpi-label">Lucro estimado</div><div class="kpi-value">${fmt(totalL)}</div><div class="kpi-sub">${avgM.toFixed(1)}% margem</div></div>
      <div class="kpi gold"><div class="kpi-label">Investimentos</div><div class="kpi-value">${fmt(inv)}</div><div class="kpi-sub">equipamentos</div></div>
    </div>
    <div class="sec-label">Distribuição de custos</div>
    <div class="card">
      <div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:10px;">
        ${cats.map(c=>`<span style="display:flex;align-items:center;gap:4px;font-size:11px;color:var(--text2)"><span style="width:8px;height:8px;border-radius:2px;background:${['#1a4a7a','#3B6D11','#C69E63','#534AB7'][CATS.indexOf(c)]}"></span>${c.label}</span>`).join('')}
      </div>
      <div class="chart-wrap"><canvas id="dash-cat" role="img" aria-label="Gráfico de custos por categoria"></canvas></div>
    </div>
    <div class="sec-label">Obras</div>
    ${jobCards||'<div class="empty">Nenhuma obra cadastrada ainda.</div>'}
  `;

  const ctx = document.getElementById('dash-cat');
  if(ctx && cats.some(c=>c.v>0)) {
    CHARTS['dash-cat'] = new Chart(ctx, {
      type:'doughnut',
      data:{labels:cats.map(c=>c.label),datasets:[{data:cats.map(c=>c.v),backgroundColor:['#1a4a7a','#3B6D11','#C69E63','#534AB7'],borderWidth:0}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}
    });
  }
}

function filterPeriodo(items, p, campo) {
  const now = new Date();
  return items.filter(i=>{
    const d = new Date(i[campo]+'T00:00:00');
    if(p==='semanal'){const s=new Date(now);s.setDate(now.getDate()-now.getDay());s.setHours(0,0,0,0);const e=new Date(s);e.setDate(s.getDate()+6);return d>=s&&d<=e;}
    if(p==='mensal') return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
    if(p==='trimestral'){const q=Math.floor(now.getMonth()/3);return Math.floor(d.getMonth()/3)===q&&d.getFullYear()===now.getFullYear();}
    if(p==='semestral'){const h=now.getMonth()<6?0:1;return(d.getMonth()<6?0:1)===h&&d.getFullYear()===now.getFullYear();}
    return d.getFullYear()===now.getFullYear();
  });
}

function rLucros() {
  dc('lucros-bar');
  const el = document.getElementById('view-lucros');
  const p = ST.periodo;
  const pl = filterPeriodo(DB.lancamentos.filter(l=>l.tipo==='obra'), p, 'data');
  const custoP = pl.reduce((s,l)=>s+(Number(l.valor)||0),0);
  const totalC = DB.obras.reduce((s,j)=>s+(Number(j.contrato)||0),0);
  const totalL = DB.obras.reduce((s,j)=>s+lucro(j),0);
  const avgM = totalC>0?(totalL/totalC*100):0;
  const lucroReal = DB.obras.filter(j=>j.status==='concluida').reduce((s,j)=>s+lucro(j),0);
  const pnomes = {semanal:'semana',mensal:'mês',trimestral:'trimestre',semestral:'semestre',anual:'ano'};

  const periodos = ['semanal','mensal','trimestral','semestral','anual'];
  const pLabels = {semanal:'Semanal',mensal:'Mensal',trimestral:'Trimestral',semestral:'Semestral',anual:'Anual'};

  const jobRows = DB.obras.map(j=>{
    const pr=lucro(j); const m=margem(j); const done=j.status==='concluida';
    const lp=pl.filter(l=>l.obra_id==j.id).reduce((s,l)=>s+(Number(l.valor)||0),0);
    return `<div class="job-card">
      <div class="job-top">
        <div>
          <div class="job-name">${j.nome}</div>
          <span class="badge ${done?'b-done':'b-active'}">${done?'Lucro real':'Lucro estimado'}</span>
        </div>
        <div style="text-align:right;">
          <div style="font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;color:${pr>=0?'var(--success)':'var(--danger)'};">${fmt(pr)}</div>
          <div class="job-meta">${m.toFixed(1)}% margem</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:8px;">
        <div><div style="font-size:10px;color:var(--text3);">Contrato</div><div style="font-size:13px;font-weight:500;color:var(--navy);">${fmt(j.contrato)}</div></div>
        <div><div style="font-size:10px;color:var(--text3);">Custo total</div><div style="font-size:13px;font-weight:500;color:var(--navy);">${fmt(custo(j.id))}</div></div>
        <div><div style="font-size:10px;color:var(--text3);">Custo este ${pnomes[p]}</div><div style="font-size:13px;font-weight:500;color:var(--navy);">${fmt(lp)}</div></div>
      </div>
      <div class="progress-bg" style="margin-top:8px;"><div class="progress-fg" style="width:${pct(j)}%;background:${pr>=0?'#C69E63':'#E24B4A'};"></div></div>
    </div>`;
  }).join('');

  el.innerHTML = `
    <div class="profit-hero">
      <div class="profit-hero-label">Lucro estimado total</div>
      <div class="profit-hero-val">${fmt(totalL)}</div>
      <div class="profit-hero-sub">${avgM.toFixed(1)}% margem média</div>
      <div class="profit-hero-grid">
        <div><div class="phi-label">Contratos</div><div class="phi-val">${fmt(totalC)}</div></div>
        <div><div class="phi-label">Custos este ${pnomes[p]}</div><div class="phi-val">${fmt(custoP)}</div></div>
        <div><div class="phi-label">Lucro real</div><div class="phi-val" style="color:${lucroReal>=0?'var(--gold)':'#F09595'};">${fmt(lucroReal)}</div></div>
        <div><div class="phi-label">Obras ativas</div><div class="phi-val">${DB.obras.filter(j=>j.status!=='concluida').length}</div></div>
      </div>
    </div>
    <div class="period-bar">${periodos.map(x=>`<button class="period-btn ${p===x?'active':''}" onclick="setPeriodo('${x}')">${pLabels[x]}</button>`).join('')}</div>
    <div class="card" style="margin-bottom:1.25rem;">
      <div class="chart-wrap"><canvas id="lucros-bar" role="img" aria-label="Gráfico contrato vs custo vs lucro por obra"></canvas></div>
    </div>
    <div class="sec-label">Por obra</div>
    ${jobRows||'<div class="empty">Nenhuma obra cadastrada.</div>'}
  `;

  const ctx = document.getElementById('lucros-bar');
  if(ctx && DB.obras.length) {
    CHARTS['lucros-bar'] = new Chart(ctx, {
      type:'bar',
      data:{
        labels:DB.obras.map(j=>j.nome.length>15?j.nome.substring(0,15)+'...':j.nome),
        datasets:[
          {label:'Contrato',data:DB.obras.map(j=>Number(j.contrato)||0),backgroundColor:'rgba(16,42,75,0.2)'},
          {label:'Custo',data:DB.obras.map(j=>custo(j.id)),backgroundColor:'rgba(198,158,99,0.5)'},
          {label:'Lucro',data:DB.obras.map(j=>lucro(j)),backgroundColor:DB.obras.map(j=>lucro(j)>=0?'#102A4B':'#E24B4A')},
        ]
      },
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{font:{size:10},autoSkip:false,maxRotation:15}},y:{ticks:{callback:v=>'$'+Math.round(v/1000)+'k',font:{size:10}}}}}
    });
  }
}

function setPeriodo(p) { ST.periodo=p; rLucros(); }

function rObras() {
  const el = document.getElementById('view-obras');
  const j = DB.obras.find(x=>x.id==ST.obraAtiva) || DB.obras[0];
  const chips = `<div class="chips">
    ${DB.obras.map(x=>`<button class="chip ${x.id==ST.obraAtiva?'active':''}" onclick="selObra('${x.id}')">${x.nome.split('–')[0].trim()}</button>`).join('')}
    <button class="chip add" onclick="novaObra()">+ Nova obra</button>
  </div>`;

  if(!j){el.innerHTML=chips+`<div class="empty">Nenhuma obra cadastrada.</div>`;return;}

  const pr=lucro(j); const m=margem(j); const done=j.status==='concluida';
  const lans = DB.lancamentos.filter(l=>l.obra_id==j.id&&l.tipo==='obra').sort((a,b)=>new Date(b.data)-new Date(a.data));

  el.innerHTML = `${chips}
    <div class="job-card" style="background:${pr>=0?'#f5f9f0':'#fdf3f3'};border-color:${pr>=0?'#c0dd97':'#F7C1C1'};">
      <div class="job-top">
        <div>
          <div class="job-name" style="color:${pr>=0?'#27500A':'#791F1F'};">${done?'Lucro real':'Lucro estimado'}</div>
          <span class="badge ${done?'b-done':'b-active'}">${done?'Concluída':'Em andamento'}</span>
        </div>
        <div style="text-align:right;">
          <div style="font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:300;color:${pr>=0?'var(--success)':'var(--danger)'};">${fmt(pr)}</div>
          <div class="job-meta">${m.toFixed(1)}% margem</div>
        </div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
        <div><div style="font-size:10px;color:var(--text3);">Contrato</div><div style="font-size:14px;font-weight:500;color:var(--navy);">${fmt(j.contrato)}</div></div>
        <div><div style="font-size:10px;color:var(--text3);">Custo total</div><div style="font-size:14px;font-weight:500;color:var(--navy);">${fmt(custo(j.id))}</div></div>
        <div><div style="font-size:10px;color:var(--text3);">Restante</div><div style="font-size:14px;font-weight:500;color:var(--navy);">${fmt((Number(j.contrato)||0)-custo(j.id))}</div></div>
      </div>
    </div>
    <div class="card">
      <div style="font-size:12px;font-weight:500;color:var(--navy);margin-bottom:10px;letter-spacing:.04em;">Configurações da obra</div>
      <div class="form-row">
        <div class="field"><label>Valor do contrato (USD)</label><input type="number" value="${j.contrato||0}" min="0" step="100" onchange="updContrato('${j.id}',this.value)"></div>
        <div class="field"><label>Status</label><select onchange="updStatus('${j.id}',this.value)">
          <option value="ativa" ${j.status!=='concluida'?'selected':''}>Em andamento</option>
          <option value="concluida" ${j.status==='concluida'?'selected':''}>Concluída</option>
        </select></div>
      </div>
    </div>
    <div class="sec-label">Lançamentos (${lans.length})</div>
    <div class="card">${lans.length===0?'<div class="empty">Nenhum lançamento nesta obra.</div>':lans.map(l=>{
      const c=CATS.find(x=>x.id===l.categoria)||CATS[0];
      const d=new Date(l.data+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
      return `<div class="entry-row">
        <div style="flex:1;min-width:0;"><div class="entry-desc">${l.descricao}</div><div class="entry-meta">${d} <span class="badge ${c.tag}">${c.label}</span></div></div>
        <div class="entry-val">${fmt2(l.valor)}<button class="del-btn" onclick="delLanc('${l.id}')">✕</button></div>
      </div>`;
    }).join('')}</div>`;
}

function selObra(id) { ST.obraAtiva=id; rObras(); }

async function novaObra() {
  const nome = prompt('Nome da obra:');
  if(!nome||!nome.trim()) return;
  const contrato = parseFloat(prompt('Valor do contrato (USD):')||'0')||0;
  const id = gerarId();
  await salvar('obras', {id, nome:nome.trim(), contrato, status:'ativa', data_inicio:new Date().toISOString().split('T')[0]});
  ST.obraAtiva = id;
  rObras();
}

async function updContrato(id, v) { await atualizar('obras', id, {contrato: parseFloat(v)||0}); }
async function updStatus(id, v) { await atualizar('obras', id, {status: v}); }

function rLancar() {
  const el = document.getElementById('view-lancar');
  const isInv = ST.tipoForm==='inv';
  const hoje = new Date().toISOString().split('T')[0];
  el.innerHTML = `
    <button class="camera-btn" onclick="document.getElementById('camera-input').click()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/><circle cx="12" cy="13" r="4"/></svg>
      Fotografar nota fiscal
    </button>
    <div class="info-box">Dica: tire uma foto da nota fiscal e envie aqui no chat do Claude — eu leio os valores e preencho automaticamente para você!</div>
    <div class="card">
      <div style="font-size:10px;color:var(--text3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:8px;">Tipo de despesa</div>
      <div class="tipo-grid">
        <button class="tipo-btn ${!isInv?'active':''}" onclick="setTipo('obra')">Custo de obra<span>lançado em uma obra</span></button>
        <button class="tipo-btn ${isInv?'active':''}" onclick="setTipo('inv')">Investimento<span>ferramentas, equipamentos</span></button>
      </div>
      ${!isInv?`<div class="field"><label>Obra</label><select id="f-obra">${DB.obras.map(j=>`<option value="${j.id}">${j.nome}</option>`).join('')}</select></div>`:''}
      <div class="form-row">
        <div class="field"><label>Categoria</label><select id="f-cat">${CATS.map(c=>`<option value="${c.id}">${c.label}</option>`).join('')}</select></div>
        <div class="field"><label>Valor (USD)</label><input type="number" id="f-val" placeholder="0.00" min="0" step="0.01"></div>
      </div>
      <div class="field"><label>Descrição</label><input type="text" id="f-desc" placeholder="${isInv?'ex: Furadeira DeWalt':'ex: Cimento 50kg'}"></div>
      <div class="field" style="width:50%;"><label>Data</label><input type="date" id="f-data" value="${hoje}"></div>
      <button class="submit-btn" onclick="addLanc()">Adicionar lançamento</button>
    </div>
    <div id="fb"></div>`;
}

function setTipo(t) { ST.tipoForm=t; rLancar(); }

async function addLanc() {
  const isInv = ST.tipoForm==='inv';
  const obra_id = isInv?null:document.getElementById('f-obra')?.value;
  const categoria = document.getElementById('f-cat').value;
  const descricao = document.getElementById('f-desc').value.trim();
  const valor = parseFloat(document.getElementById('f-val').value);
  const data = document.getElementById('f-data').value;
  const fb = document.getElementById('fb');
  if(!descricao){fb.innerHTML=`<div class="feedback err">Informe uma descrição.</div>`;return;}
  if(!valor||valor<=0){fb.innerHTML=`<div class="feedback err">Informe um valor válido.</div>`;return;}
  if(!data){fb.innerHTML=`<div class="feedback err">Informe uma data.</div>`;return;}

  const id = gerarId();
  if(isInv) {
    await salvar('investimentos', {id, categoria, descricao, valor, data});
  } else {
    await salvar('lancamentos', {id, obra_id, categoria, descricao, valor, data, tipo:'obra'});
  }
  fb.innerHTML=`<div class="feedback ok">Lançamento adicionado e salvo no Google Sheets!</div>`;
  rLancar();
}

async function delLanc(id) { if(confirm('Remover este lançamento?')) await deletar('lancamentos', id); rObras(); }

function rInv() {
  const el = document.getElementById('view-investimentos');
  const invs = DB.investimentos.sort((a,b)=>new Date(b.data)-new Date(a.data));
  const total = invs.reduce((s,i)=>s+(Number(i.valor)||0),0);
  el.innerHTML = `
    <div class="kpi-grid">
      <div class="kpi gold"><div class="kpi-label">Total investido</div><div class="kpi-value">${fmt(total)}</div><div class="kpi-sub">${invs.length} itens</div></div>
      ${CATS.map(c=>{const v=invs.filter(i=>i.categoria===c.id).reduce((s,i)=>s+(Number(i.valor)||0),0);return `<div class="kpi"><div class="kpi-label">${c.label}</div><div class="kpi-value" style="font-size:16px;">${fmt(v)}</div></div>`;}).join('')}
    </div>
    <div class="sec-label">Todos os investimentos</div>
    <div class="card">${invs.length===0?'<div class="empty">Nenhum investimento registrado.</div>':invs.map(i=>{
      const c=CATS.find(x=>x.id===i.categoria)||CATS[0];
      const d=new Date(i.data+'T00:00:00').toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'});
      return `<div class="entry-row">
        <div style="flex:1;min-width:0;"><div class="entry-desc">${i.descricao}</div><div class="entry-meta">${d} <span class="badge ${c.tag}">${c.label}</span></div></div>
        <div class="entry-val">${fmt2(i.valor)}<button class="del-btn" onclick="delInv('${i.id}')">✕</button></div>
      </div>`;
    }).join('')}</div>`;
}

async function delInv(id) { if(confirm('Remover este investimento?')) await deletar('investimentos', id); rInv(); }

document.getElementById('camera-input').addEventListener('change', function(e) {
  if(e.target.files && e.target.files[0]) {
    alert('Foto capturada! Agora envie essa imagem no chat do Claude e peça para eu classificar o gasto automaticamente.');
    e.target.value = '';
  }
});

// Inicializar
carregarDados();
</script>
